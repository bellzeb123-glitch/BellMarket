name: Build BellMarket

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: BellMarket
          path: target/BellMarket-*.jar

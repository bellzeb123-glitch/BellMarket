# ================================================================
#  BellMarket - Category: Mounts & Boosters
#  Filename: 06_mounts.yml
# ================================================================

category:
  name: "&dMounts"
  display-name: "&dMounts"
  icon:
    material: SADDLE
    name: "&dMounts"
    lore:
      - "&7Browse available mounts"
      - ""
      - "&eClick to open"
  order: 6
  enabled: true

products:

  # ── MOUNT EXAMPLE (via command) ──────────────────────────────
  # Works with ANY mount plugin - just change the command
  frost_horse:
    type: COMMAND
    name: "&bFrost Horse"
    lore:
      - "&7A majestic horse from the frozen wastes."
      - ""
      - "&6Price: &e{price} {currency}"
      - ""
      - "&aLeft-click &7to purchase"
    icon:
      material: SADDLE
      name: "&bFrost Horse"
    price: 500
    enabled: true
    # Commands executed as CONSOLE after purchase
    # Use {player} placeholder for player name
    commands:
      - "em addCustomItem {player} frost_horse_item 1"
      # For MythicMounts: "mm mounts give {player} frost_horse"
      # For EpicMounts:   "epicmounts give {player} frost_horse"
      # For FMM mount:    "fmm spawn {player} frost_horse_model"

  # ── BOOSTER EXAMPLE (custom EliteMobs item) ──────────────────
  water_breathing_booster:
    type: COMMAND
    name: "&3Water Breathing Booster"
    lore:
      - "&7Grants water breathing while held."
      - "&7EliteMobs custom item."
      - ""
      - "&6Price: &e{price} {currency}"
      - ""
      - "&aLeft-click &7to purchase"
    icon:
      material: PUFFERFISH
    price: 200
    enabled: true
    commands:
      - "em addCustomItem {player} water_breathing_booster 1"

  # ── ITEM EXAMPLE (direct item give) ─────────────────────────
  # Type ITEM gives a vanilla or custom item directly
  diamond_bundle:
    type: ITEM
    name: "&bDiamond Bundle"
    lore:
      - "&7A bundle of 16 diamonds."
      - ""
      - "&6Price: &e{price} {currency}"
      - ""
      - "&aLeft-click &7to purchase"
    icon:
      material: DIAMOND
    price: 300
    enabled: true
    item:
      material: DIAMOND
      amount: 16
      name: "&bDiamond"

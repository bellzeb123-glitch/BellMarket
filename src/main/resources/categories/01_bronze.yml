# ================================================================
#  BellMarket - Category: Bronze Skins
#  Filename: 01_bronze.yml
# ================================================================

# Category display settings
category:
  # Name shown in main menu and GUI title
  name: "&6Bronze Skins"
  # Short name for GUI title
  display-name: "&6Bronze"
  # Icon shown in main menu
  icon:
    material: ORANGE_STAINED_GLASS_PANE
    name: "&6Bronze Skins"
    lore:
      - "&7Browse Bronze tier skins"
      - ""
      - "&eClick to open"
  # Sort order in main menu (lower = shown first)
  order: 1
  # Whether this category is enabled
  enabled: true

# Products in this category
# Product types:
#   SKIN_TOKEN  - gives a SkinStudio skin token (requires SkinStudio plugin)
#   ITEM        - gives a specific item
#   COMMAND     - executes one or more commands
#   MOUNT       - gives a mount (via command)
products:

  bronze_sword_skin:
    type: SKIN_TOKEN
    skin-id: bronze_sword
    name: "&8[&6Bronze&8] &fSword Skin"
    lore:
      - "&7Applies Bronze skin to your sword."
      - ""
      - "&6Price: &e{price} {currency}"
      - ""
      - "&aLeft-click &7to purchase"
    icon:
      material: IRON_SWORD
      item-model: "elitemobs:gear/bronze_sword"
    price: 100
    # Also give a Change Token automatically?
    include-change-token: true
    enabled: true

  bronze_axe_skin:

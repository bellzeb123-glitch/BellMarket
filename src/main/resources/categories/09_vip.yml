# ================================================================
#  BellMarket - Category: VIP
#  Premium category — products bought with VIP Tokens.
#  Shown as the featured category in the top bar (slot 7).
# ================================================================

category:
  name: "&d✦ VIP"
  display-name: "&dVIP"
  icon:
    material: NETHER_STAR
    name: "&d✦ VIP Store"
    lore:
      - "&7Exclusive products available only"
      - "&7for &dVIP Tokens&7."
      - ""
      - "&eClick to open"

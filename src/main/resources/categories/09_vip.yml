  enabled: true

products:

  vip_example:
    type: COMMAND
    name: "&d✦ Example VIP Reward"
    lore:
      - "&7An example product bought with VIP Tokens."
      - ""
      - "&6Price: &e{price} {currency}"
      - ""
      - "&aLeft-click &7to purchase"
    icon:
      material: DIAMOND
    price: 1
    currency: viptoken
    enabled: true
    commands:
      - "say {player} redeemed an example VIP reward!"

name: BellMarket
version: 1.26.1.2
main: pl.bellmarket.BellMarket
api-version: "26.1.2"
description: Universal shop plugin with dual currency, VIP system and SkinStudio integration
authors: [Bellzeb]
website: ''

# Free needs only SkinStudio. MythicMobs/EliteMobs/FMM auto-detection is in BellMarketPro addon.
softdepend:
  - SkinStudio

commands:
  bellmarket:
    description: Opens the BellMarket shop
    usage: /bellmarket [admin|reload|prices|lang]
    aliases: [bm, shop]
  bellcoins:
    description: Manage BellCoins currency
    usage: /bellcoins <balance|give|take|set|top> [player] [amount]
    aliases: [bc, coins]
  vt:
    description: Manage VIP Tokens
    usage: /vt <balance|give|take|set|top> [player] [amount]
    aliases: [viptokens, vtoken]

permissions:
  bellmarket.shop:
    description: Open shop
    default: true
  bellmarket.admin:
    description: Admin commands and price editor
    default: op
  bellmarket.vip:
    description: Access VIP category
    default: false
  bellmarket.coins.balance:
    default: true
  bellmarket.coins.balance.others:
    default: op
  bellmarket.coins.give:
    default: op
  bellmarket.coins.take:
    default: op
  bellmarket.coins.set:
    default: op
  bellmarket.coins.top:
    default: true
  bellmarket.viptoken.balance:
    default: true
  bellmarket.viptoken.balance.others:
    default: op
  bellmarket.viptoken.admin:
    default: op
  bellmarket.viptoken.top:
    default: true
